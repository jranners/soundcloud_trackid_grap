<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoundCloud TrackID Grabber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <!-- Favicon: small orange dot -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23ff5500'/></svg>" />
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <a class="logo" href="/">
      <div class="logo-icon">
        <!-- SoundCloud-style cloud icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
        </svg>
      </div>
      <span class="logo-text">TrackID<span>Grab</span></span>
    </a>
    <span class="header-tagline">Identify tracks from SoundCloud mixes</span>
  </header>

  <!-- ── Main ── -->
  <main>

    <!-- Hero -->
    <section class="hero">
      <h1>Identify every track in a<br><span class="accent">SoundCloud mix</span></h1>
      <p>Paste a SoundCloud mix URL below. We'll download it, fingerprint every segment, and return the full tracklist.</p>
    </section>

    <!-- URL input card -->
    <div class="card">
      <label class="form-label" for="url-input">SOUNDCLOUD URL HIER EINFÜGEN</label>
      <div class="input-row">
        <input
          id="url-input"
          class="url-input"
          type="url"
          placeholder="https://soundcloud.com/artist/mix-title"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="analyze-btn" class="btn btn-primary" aria-busy="false">
          <!-- Search / play icon -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M10 3a7 7 0 1 0 4.47 12.47l4.78 4.78 1.41-1.41-4.78-4.78A7 7 0 0 0 10 3zm0 2a5 5 0 1 1 0 10A5 5 0 0 1 10 5z"/>
          </svg>
          Analysieren
        </button>
      </div>
      <p id="error-msg" class="error-message"></p>
    </div>

    <section id="jobs-section" class="jobs-section">
      <div class="jobs-header">
        <h2>Analysen</h2>
        <span id="job-count" class="badge">0 aktiv</span>
      </div>
      <div class="set-filter-row">

        <label for="set-search-input" class="form-label sr-only">SETS FILTERN</label>
        <input
          id="set-search-input"
          class="url-input"
          type="text"
          placeholder="Sets filtern (Titel, URL, Task-ID)..."
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <div class="tab-row">
        <button id="tab-active" class="tab-btn active" type="button">Aktiv</button>
        <button id="tab-completed" class="tab-btn" type="button">Fertig</button>
      </div>
      <div id="jobs-list" class="jobs-list"></div>
    </section>

  </main>

  <!-- ── Footer ── -->
  <footer>
    <p>SoundCloud TrackID Grabber &mdash; powered by
      <a href="https://shazam.com" target="_blank" rel="noopener noreferrer">Shazam</a> fingerprinting &amp;
      <a href="https://fastapi.tiangolo.com" target="_blank" rel="noopener noreferrer">FastAPI</a>
    </p>
  </footer>

  <script src="/static/js/app.js"></script>
</body>
</html>
